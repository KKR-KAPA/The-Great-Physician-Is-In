<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Kehadiran - KKR Kapa 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="attendancePage">
  <div style="min-height:100vh;background:linear-gradient(135deg,var(--navy),#1a2a5e,var(--navy));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <img src="SDA-LOGO.png" alt="SDA" style="width:60px;height:60px;object-fit:contain;margin-bottom:24px;opacity:0.8" onerror="this.style.display='none'">

    <div id="formSection" style="width:100%;max-width:400px">
      <h1 style="color:white;font-size:22px;text-align:center;margin-bottom:6px">Kehadiran KKR</h1>
      <p style="color:var(--gold);font-size:13px;text-align:center;margin-bottom:32px">Sila isi maklumat anda untuk check in</p>

      <form id="attendanceForm">
        <div class="form-group">
          <label style="color:rgba(255,255,255,0.7)">Nama Penuh</label>
          <input id="nameInput" type="text" class="form-input" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:white;backdrop-filter:blur(4px)" placeholder="Masukkan nama anda" required>
        </div>
        <div class="form-group">
          <label style="color:rgba(255,255,255,0.7)">No. Telefon</label>
          <input id="phoneInput" type="tel" class="form-input" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:white;backdrop-filter:blur(4px)" placeholder="Cth: 60123456789" required>
        </div>
        <button id="submitBtn" type="submit" class="btn btn-gold btn-block" style="margin-top:8px">Check In</button>
      </form>
    </div>

    <div id="statusSection" style="display:none;width:100%;max-width:400px"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
