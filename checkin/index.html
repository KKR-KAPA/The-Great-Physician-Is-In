<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Kehadiran - KKR Kapa 2026</title>
  <meta property="og:title" content="Kehadiran - KKR Daerah Kapa 2026">
  <meta property="og:description" content="Check-in Kehadiran KKR Daerah Kapa 2026">
  <meta property="og:image" content="https://kkr-kapa.github.io/The-Great-Physician-Is-In/thumbnail.png">
  <meta property="og:url" content="https://kkr-kapa.github.io/The-Great-Physician-Is-In/checkin/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="../style.css">
  <style>
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; font-weight: 500; }
    .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); font-size: 16px; background: rgba(255,255,255,0.08); color: white; backdrop-filter: blur(4px); outline: none; -webkit-appearance: none; box-sizing: border-box; }
    .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,162,78,0.12); }
    .form-input::placeholder { color: rgba(255,255,255,0.35); }
    .status-box { text-align: center; }
    .status-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .status-icon.success { background: var(--sage); }
    .status-icon.duplicate { background: #eab308; }
    .status-icon svg { width: 40px; height: 40px; color: white; }
    .status-box h2 { font-size: 22px; margin-bottom: 6px; color: white; font-weight: 800; letter-spacing: -0.3px; }
    .status-box .status-msg { color: var(--gold); font-size: 15px; }
    .status-box .status-sub { color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 24px; }
    .btn-gold { background: var(--gold); color: var(--white); box-shadow: 0 4px 14px rgba(200,162,78,0.35); }
    .btn-gold:hover { background: #b8943e; }
    .btn-block { width: 100%; }
  </style>

</head>
<body id="attendancePage">
  <div style="min-height:100vh;background:linear-gradient(135deg,var(--primary),#1a2a5e,var(--primary));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <img src="../LOGO-SDA.webp" alt="SDA" style="width:80px;height:80px;object-fit:contain;margin-bottom:24px;opacity:0.8" onerror="this.style.display='none'">

    <div id="formSection" style="width:100%;max-width:400px">
      <h1 style="color:white;font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-0.3px">Kehadiran KKR</h1>
      <p id="dayIndicator" style="color:rgba(255,255,255,0.5);font-size:12px;text-align:center;margin-bottom:4px"></p>
      <p style="color:var(--gold);font-size:13px;text-align:center;margin-bottom:32px">Sila isi maklumat anda untuk check in</p>
      <p id="welcomeMsg" style="display:none;color:var(--gold);font-size:13px;text-align:center;margin-bottom:16px"></p>

      <form id="attendanceForm">
        <div class="form-group">
          <label>Nama Penuh</label>
          <input id="nameInput" type="text" class="form-input" placeholder="Masukkan nama anda" required>
        </div>
        <div class="form-group">
          <label>Gereja Asal</label>
          <select id="churchSelect" class="form-input" required>
            <option value="">Pilih gereja...</option>
            <option>Gereja Kapa</option>
            <option>Gereja Koporingan</option>
            <option>Gereja Kitapol</option>
            <option>Gereja Minangkob</option>
            <option>Gereja Togop</option>
            <option>Cabang Sekolah Sabat Daerah Kapa</option>
            <option>Lain-Lain</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bilangan Ahli Keluarga</label>
          <input id="bilanganInput" type="number" class="form-input" value="1" min="1" required>
        </div>
        <button id="submitBtn" type="submit" class="btn btn-gold btn-block" style="margin-top:8px">Check In</button>
        <a href="../home.html" style="color:rgba(255,255,255,0.35);font-size:12px;text-align:center;margin-top:16px;text-decoration:none;display:block">Ke Laman Utama →</a>
        <a id="resetProfile" href="javascript:void(0)" style="display:none;color:rgba(255,255,255,0.4);font-size:11px;text-align:center;margin-top:8px;text-decoration:none" onclick="return clearProfile()">Bukan anda? Klik di sini</a>
      </form>
    </div>

    <div id="statusSection" style="display:none;width:100%;max-width:400px"></div>
  </div>

  <script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBpUWPdX2M0TG-DnZuQy_v53jxq2Dl27PuBJgJEx6wnCgeZT_gosQYWo0Ab1tnIEQ0/exec'
const ATTENDANCE_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSBR3ctB0FYmGtvlzTkTKe1-ZT8mN7cnA8pDUfnrBsANhchBYPB3swa1Ig83quvgALlynFOlDCwQEc1/pub?gid=1475228326&single=true&output=csv'

function getTodayMsia() {
  const now = new Date()
  const msia = new Date(now.getTime() + 8 * 3600000)
  return msia.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', timeZone: 'UTC' })
}

function parseCSV(text) {
  const items = []; let cur = ''; let inQ = false
  for (let i = 0; i < text.length; i++) {
    const c = text[i]
    if (c === '"') { inQ = !inQ; continue }
    if (c === ',' && !inQ) { items.push(cur.trim()); cur = ''; continue }
    if ((c === '\n' || c === '\r') && !inQ) { if (cur) items.push(cur.trim()); cur = ''; if (c === '\r') i++; items.push('__ROW__'); continue }
    cur += c
  }
  if (cur) items.push(cur.trim())
  const rows = []; let row = []
  for (const item of items) {
    if (item === '__ROW__') { if (row.length) rows.push(row); row = []; }
    else row.push(item)
  }
  if (row.length) rows.push(row)
  return rows
}

const today = getTodayMsia()
const LS_KEY = `checkin_${today}`
const USER_KEY = 'checkin_user'

function getKkrDay() {
  const now = new Date()
  const msia = new Date(now.getTime() + 8 * 3600000)
  const msiaDate = new Date(Date.UTC(msia.getFullYear(), msia.getMonth(), msia.getDate()))
  const start = new Date(Date.UTC(2026, 6, 20))
  const end = new Date(Date.UTC(2026, 6, 26))
  if (msiaDate < start) return { label: '⏳ KKR akan bermula 20 Julai 2026' }
  if (msiaDate > end) return { label: '✅ KKR telah tamat' }
  const day = Math.floor((msiaDate - start) / 86400000) + 1
  const months = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember']
  const dateStr = `${msiaDate.getDate()} ${months[msiaDate.getMonth()]} ${msiaDate.getFullYear()}`
  return { label: `🎉 Hari ${day} · ${dateStr}`, day }
}

;(function() {
  const d = document.getElementById('dayIndicator')
  if (d) d.textContent = getKkrDay().label
})()

function clearProfile() {
  localStorage.removeItem(USER_KEY)
  location.reload()
}

function checkLocalDuplicate(key) {
  const stored = localStorage.getItem(LS_KEY)
  if (!stored) return false
  try {
    const list = JSON.parse(stored)
    return Array.isArray(list) && list.includes(key)
  } catch { return false }
}

function saveLocalCheckin(key) {
  const stored = localStorage.getItem(LS_KEY)
  let list = []
  try { list = JSON.parse(stored) || [] } catch { list = [] }
  if (!Array.isArray(list)) list = []
  if (!list.includes(key)) list.push(key)
  localStorage.setItem(LS_KEY, JSON.stringify(list))
}

// Auto-fill from saved profile + auto-redirect if already checked in today
;(function() {
  try {
    const saved = JSON.parse(localStorage.getItem(USER_KEY))
    if (saved && saved.name) {
      const dupKey = (saved.name + '|' + saved.church).toLowerCase()
      const stored = localStorage.getItem(LS_KEY)
      if (stored) {
        try {
          const list = JSON.parse(stored)
          if (Array.isArray(list) && list.includes(dupKey)) {
            window.location.href = '../home.html'
            return
          }
        } catch (e) {}
      }
      document.getElementById('nameInput').value = saved.name
      if (saved.church) document.getElementById('churchSelect').value = saved.church
      if (saved.bilangan) document.getElementById('bilanganInput').value = saved.bilangan
      const msg = document.getElementById('welcomeMsg')
      msg.style.display = 'block'
      msg.textContent = 'Selamat datang kembali, ' + saved.name + '!'
      document.getElementById('resetProfile').style.display = 'block'
    }
  } catch (e) {}
})()

document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
  e.preventDefault()
  const name = document.getElementById('nameInput').value.trim()
  const church = document.getElementById('churchSelect').value
  const bilangan = parseInt(document.getElementById('bilanganInput').value, 10) || 1
  if (!name || !church) return

  if (!confirm(`Nama: ${name}\nGereja: ${church}\nBilangan: ${bilangan}\n\nBetul?`)) return

  const dupKey = (name + '|' + church).toLowerCase()
  if (checkLocalDuplicate(dupKey)) {
    showStatus(true)
    return
  }

  const btn = document.getElementById('submitBtn')
  btn.disabled = true
  btn.innerHTML = '<div style="width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>'

  let isDuplicate = false

  try {
    const res = await fetch(ATTENDANCE_SHEET, { cache: 'no-store' })
    const rows = parseCSV(await res.text())
    isDuplicate = rows.slice(1).some(r => {
      const rowDay = (r[1] || '').trim()
      const rowName = (r[2] || '').trim().toLowerCase()
      const rowChurch = (r[3] || '').trim().toLowerCase()
      return rowDay === today && rowName === name.toLowerCase() && rowChurch === church.toLowerCase()
    })
  } catch (e) {
    if (checkLocalDuplicate(dupKey)) {
      showStatus(true)
      return
    }
  }

  if (!isDuplicate) {
    localStorage.setItem(USER_KEY, JSON.stringify({ name, church, bilangan }))
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ name, church, bilangan }),
      })
    } catch (e) {}
  }

  saveLocalCheckin(dupKey)
  showStatus(isDuplicate)
})

function showStatus(isDuplicate) {
  document.getElementById('formSection').style.display = 'none'
  const statusSection = document.getElementById('statusSection')
  statusSection.style.display = 'block'

  if (isDuplicate) {
    statusSection.innerHTML = '<div class="status-box"><div class="status-icon duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v2m0 4h.01"/></svg></div><h2>Anda Sudah Check In</h2><p class="status-msg" style="color:#fcd34d">Anda sudah check in hari ini</p><p class="status-sub">Mengalihkan...</p><a href="../home.html" style="color:var(--gold);font-size:13px;margin-top:12px;display:inline-block;text-decoration:none">Ke Laman Utama →</a></div>'
  } else {
    statusSection.innerHTML = '<div class="status-box"><div class="status-icon success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg></div><h2>Check In Berjaya!</h2><p class="status-msg">Selamat datang ke KKR</p><p class="status-sub">Mengalihkan...</p><a href="../home.html" style="color:var(--gold);font-size:13px;margin-top:12px;display:inline-block;text-decoration:none">Ke Laman Utama →</a></div>'
  }

  setTimeout(() => { window.location.href = '../home.html' }, 2500)
}
  </script>
</body>
</html>
